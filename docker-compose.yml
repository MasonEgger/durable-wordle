services:
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=sqlite
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml

  worker:
    build: .
    command: uv run python -m durable_wordle.worker
    depends_on:
      - temporal
    environment:
      - DURABLE_WORDLE_TEMPORAL_HOST=temporal:7233
    restart: on-failure

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - temporal
      - worker
    environment:
      - DURABLE_WORDLE_TEMPORAL_HOST=temporal:7233
