services:
  temporal:
    image: temporalio/temporal:latest
    command: server start-dev --ip 0.0.0.0 --db-filename /data/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - ./temporal.db:/data/temporal.db
    restart: unless-stopped

  worker:
    build: .
    command: uv run python -m durable_wordle.worker
    depends_on:
      - temporal
    environment:
      - DURABLE_WORDLE_TEMPORAL_HOST=temporal:7233
    restart: on-failure

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - temporal
      - worker
    environment:
      - DURABLE_WORDLE_TEMPORAL_HOST=temporal:7233
