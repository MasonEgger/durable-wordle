<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durable Wordle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .tile-flip { animation: flip 0.3s ease-in-out; }
        @keyframes flip {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center">
    <header class="w-full max-w-lg border-b border-gray-700 py-3 text-center">
        <h1 class="text-3xl font-bold tracking-wide">Durable Wordle</h1>
    </header>

    <main id="game-content" class="flex-1 flex flex-col items-center w-full max-w-lg px-4 py-4 gap-4">
        {% include "_board_partial.html" %}
    </main>

    <script>
    function shareResults() {
        const emojiMap = {
            'bg-green-500': '🟩',
            'bg-yellow-500': '🟨',
            'bg-gray-500': '⬛'
        };
        const rows = document.querySelectorAll('#game-board .guess-row');
        let result = 'Durable Wordle\n\n';
        let hasGuesses = false;
        rows.forEach(function(row) {
            const tiles = row.querySelectorAll('div[class*="bg-green"], div[class*="bg-yellow"], div[class*="bg-gray-500"]');
            if (tiles.length > 0) {
                hasGuesses = true;
                tiles.forEach(function(tile) {
                    const classes = tile.className;
                    if (classes.includes('bg-green-500')) result += emojiMap['bg-green-500'];
                    else if (classes.includes('bg-yellow-500')) result += emojiMap['bg-yellow-500'];
                    else if (classes.includes('bg-gray-500')) result += emojiMap['bg-gray-500'];
                });
                result += '\n';
            }
        });
        if (hasGuesses) {
            navigator.clipboard.writeText(result.trim()).then(function() {
                document.getElementById('share-confirmation').classList.remove('hidden');
                setTimeout(function() {
                    document.getElementById('share-confirmation').classList.add('hidden');
                }, 2000);
            });
        }
    }

    // Keyboard click handler — type letter into input
    document.addEventListener('click', function(event) {
        if (event.target.classList.contains('keyboard-key')) {
            const input = document.getElementById('guess-input');
            if (input && input.value.length < 5) {
                input.value += event.target.dataset.key;
                input.focus();
            }
        }
    });
    </script>
</body>
</html>
