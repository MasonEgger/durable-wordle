<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durable Wordle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'temporal-uv': '#444CE7',
                    'temporal-black': '#141414',
                    'temporal-white': '#F8FAFC',
                }
            }
        }
    }
    </script>
    <style>
        body {
            background:
                radial-gradient(ellipse at 20% 0%, rgba(68, 76, 231, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(99, 56, 204, 0.18) 0%, transparent 50%),
                #141414;
        }
        .grid-bg {
            background-image:
                linear-gradient(rgba(68, 76, 231, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(68, 76, 231, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow-uv {
            box-shadow: 0 0 20px rgba(68, 76, 231, 0.3), 0 0 60px rgba(68, 76, 231, 0.1);
        }
        .tile-reveal {
            animation: reveal 0.5s ease-in-out both;
        }
        @keyframes reveal {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        .tile-pop { animation: pop 0.1s ease-in-out; }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
            20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
    </style>
</head>
<body class="text-temporal-white min-h-screen flex flex-col items-center grid-bg">
    <header class="w-full max-w-lg border-b border-gray-700/50 py-4 flex items-center justify-center gap-3">
        <img src="/static/ziggy.png" alt="Ziggy" class="w-10 h-10 drop-shadow-lg">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-wide bg-gradient-to-r from-temporal-white to-gray-400 bg-clip-text text-transparent">Durable Wordle</h1>
            <p class="text-xs text-gray-500 mt-0.5">Powered by <a href="https://temporal.io" target="_blank" rel="noopener" class="text-temporal-uv font-semibold hover:underline hover:brightness-125 transition-all">Temporal</a></p>
        </div>
    </header>

    <main id="game-content" class="flex-1 flex flex-col items-center w-full max-w-lg px-4 py-4 gap-4">
        {% include "_board_partial.html" %}
    </main>

    <script>
    function shareResults() {
        const emojiMap = {
            'bg-green-500': '🟩',
            'bg-yellow-500': '🟨',
            'bg-gray-500': '⬛'
        };
        const rows = document.querySelectorAll('#game-board .guess-row');
        let result = 'Durable Wordle\n\n';
        let hasGuesses = false;
        rows.forEach(function(row) {
            const tiles = row.querySelectorAll('div[class*="bg-green"], div[class*="bg-yellow"], div[class*="bg-gray-500"]');
            if (tiles.length > 0) {
                hasGuesses = true;
                tiles.forEach(function(tile) {
                    const classes = tile.className;
                    if (classes.includes('bg-green-500')) result += emojiMap['bg-green-500'];
                    else if (classes.includes('bg-yellow-500')) result += emojiMap['bg-yellow-500'];
                    else if (classes.includes('bg-gray-500')) result += emojiMap['bg-gray-500'];
                });
                result += '\n';
            }
        });
        if (hasGuesses) {
            navigator.clipboard.writeText(result.trim()).then(function() {
                document.getElementById('share-confirmation').classList.remove('hidden');
                setTimeout(function() {
                    document.getElementById('share-confirmation').classList.add('hidden');
                }, 2000);
            });
        }
    }

    // Current guess state
    let currentGuess = '';
    const MAX_LENGTH = 5;

    function getCurrentTiles() {
        return document.querySelectorAll('.current-tile');
    }

    function updateTiles() {
        const tiles = getCurrentTiles();
        tiles.forEach(function(tile, index) {
            const letter = currentGuess[index] || '';
            tile.textContent = letter;
            if (letter) {
                tile.classList.remove('border-gray-600');
                tile.classList.add('border-gray-400');
            } else {
                tile.classList.remove('border-gray-400');
                tile.classList.add('border-gray-600');
            }
        });
        // Update hidden input
        const input = document.getElementById('guess-input');
        if (input) {
            input.value = currentGuess;
        }
    }

    function addLetter(letter) {
        if (currentGuess.length >= MAX_LENGTH) return;
        currentGuess += letter.toUpperCase();
        updateTiles();
        // Pop animation on the tile that just got a letter
        const tiles = getCurrentTiles();
        const tile = tiles[currentGuess.length - 1];
        if (tile) {
            tile.classList.add('tile-pop');
            setTimeout(function() { tile.classList.remove('tile-pop'); }, 100);
        }
    }

    function removeLetter() {
        if (currentGuess.length === 0) return;
        currentGuess = currentGuess.slice(0, -1);
        updateTiles();
    }

    function submitGuess() {
        if (currentGuess.length !== MAX_LENGTH) {
            // Shake the current row
            const row = document.getElementById('current-row');
            if (row) {
                row.classList.add('shake');
                setTimeout(function() { row.classList.remove('shake'); }, 500);
            }
            return;
        }
        const form = document.getElementById('guess-form');
        if (form) {
            // Don't clear currentGuess yet — wait for successful swap
            htmx.trigger(form, 'submit');
        }
    }

    // On-screen keyboard clicks
    document.addEventListener('click', function(event) {
        const target = event.target.closest('.keyboard-key');
        if (!target) return;

        if (target.dataset.action === 'enter') {
            submitGuess();
        } else if (target.dataset.action === 'backspace') {
            removeLetter();
        } else if (target.dataset.key) {
            addLetter(target.dataset.key);
        }
    });

    // Physical keyboard support
    document.addEventListener('keydown', function(event) {
        // Don't capture if user is in a visible text input
        if (event.target.tagName === 'TEXTAREA') return;
        if (event.target.tagName === 'INPUT' && event.target.type === 'text') return;
        if (event.ctrlKey || event.metaKey || event.altKey) return;

        if (event.key === 'Enter') {
            event.preventDefault();
            submitGuess();
        } else if (event.key === 'Backspace') {
            event.preventDefault();
            removeLetter();
        } else if (/^[a-zA-Z]$/.test(event.key)) {
            event.preventDefault();
            addLetter(event.key);
        }
    });

    // After HTMX swap: reset guess state and animate tile reveals
    document.body.addEventListener('htmx:afterSwap', function() {
        currentGuess = '';

        // Animate tile-reveal: apply color at the midpoint of each flip
        document.querySelectorAll('.tile-reveal').forEach(function(tile) {
            var colorClass = tile.dataset.color;
            // Parse the delay from the inline style (e.g., "300ms")
            var delayMs = parseInt(tile.style.animationDelay) || 0;
            // Apply color at midpoint of the 500ms flip (250ms after delay)
            setTimeout(function() {
                tile.className = tile.className
                    .replace('border-gray-600/50', '')
                    .replace('border-gray-600', '')
                    .replace('bg-gray-800/60', '')
                    .replace('bg-gray-800', '');
                colorClass.split(' ').forEach(function(cls) {
                    tile.classList.add(cls);
                });
            }, delayMs + 250);
        });

        // Reveal status message, endgame actions, and next row after the last tile flips
        var revealTiles = document.querySelectorAll('.tile-reveal');
        if (revealTiles.length > 0) {
            var lastDelay = (revealTiles.length - 1) * 300 + 500;
            setTimeout(function() {
                var statusMsg = document.getElementById('status-message');
                if (statusMsg) statusMsg.classList.remove('hidden');
                var endgame = document.getElementById('endgame-actions');
                if (endgame) endgame.classList.remove('hidden');
                var currentTiles = document.querySelectorAll('.current-tile');
                currentTiles.forEach(function(tile) {
                    tile.classList.remove('border-gray-700/30', 'bg-gray-800/20');
                    tile.classList.add('border-gray-600/50', 'bg-gray-800/40');
                });
            }, lastDelay);
        } else {
            // No animation (e.g. page reload) — show immediately
            var statusMsg = document.getElementById('status-message');
            if (statusMsg) statusMsg.classList.remove('hidden');
            var endgame = document.getElementById('endgame-actions');
            if (endgame) endgame.classList.remove('hidden');
        }

        // Auto-dismiss error message after 2 seconds
        var errorMsg = document.getElementById('error-message');
        if (errorMsg) {
            setTimeout(function() { errorMsg.remove(); }, 2000);
        }
    });

    // Handle guess errors without replacing the board
    document.body.addEventListener('guessError', function(event) {
        var message = event.detail.value;

        // Shake the current row
        var row = document.getElementById('current-row');
        if (row) {
            row.classList.add('shake');
            setTimeout(function() { row.classList.remove('shake'); }, 500);
        }

        // Show a toast
        var existing = document.getElementById('error-toast');
        if (existing) existing.remove();

        var toast = document.createElement('div');
        toast.id = 'error-toast';
        toast.className = 'fixed top-16 left-1/2 -translate-x-1/2 bg-temporal-white text-temporal-black px-4 py-2 rounded font-bold text-sm z-50';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 2000);
    });
    </script>
</body>
</html>
